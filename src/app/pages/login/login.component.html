<main class="login-page">
  <section class="login-card">
    <h1>Ford Dashboard</h1>
    <p>Acesse sua conta para visualizar os dados dos veículos.</p>

    <form (ngSubmit)="entrar()">
      <div class="form-group">
        <label for="nome">Nome</label>
        <input
          id="nome"
          type="text"
          name="nome"
          [(ngModel)]="nome"
          placeholder="Digite seu nome"
        />
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input
          id="senha"
          type="password"
          name="senha"
          [(ngModel)]="senha"
          placeholder="Digite sua senha"
        />
      </div>

      <p class="erro" *ngIf="mensagemErro">
        {{ mensagemErro }}
      </p>

      <button type="submit">Entrar</button>
    </form>
  </section>
</main>
